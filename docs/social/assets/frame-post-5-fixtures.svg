<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1400" viewBox="0 0 1400 1400" role="img">
  <defs>
    <pattern id="paperGrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#d9d6cc" stroke-width="1" opacity="0.45"/>
    </pattern>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#64748b"/>
    </marker>
    <style>
      .label { font-family: Inter, Arial, sans-serif; }
      .mono { font-family: Consolas, monospace; }
    </style>
  </defs>
  <rect width="1400" height="1400" fill="#f8f4ea"/>
  <rect width="1400" height="1400" fill="url(#paperGrid)" opacity="0.8"/>
  <text x="86" y="112" font-size="47" font-weight="800" fill="#0f172a" class="label">Fixtures create pressure.</text>
  <text x="88" y="170" font-size="25" font-weight="450" fill="#475569" class="label">Small, tooling-heavy, and workflow-heavy projects expose different weaknesses.</text>
  <rect x="100" y="335" width="1200" height="670" rx="45" fill="#fffaf1" stroke="#cbd5e1" stroke-width="4"/>
<rect x="150" y="430" width="310" height="255" rx="28" fill="#ecfeff" stroke="#0891b2" stroke-width="4"/>
<text x="184" y="488" class="label" font-size="38" font-weight="760" fill="#334155">organize</text>
<text x="184" y="534" class="label" font-size="26" fill="#64748b">small CLI</text><rect x="545" y="430" width="310" height="255" rx="28" fill="#f5f3ff" stroke="#7c3aed" stroke-width="4"/>
<text x="579" y="488" class="label" font-size="38" font-weight="760" fill="#334155">autopahe</text>
<text x="579" y="534" class="label" font-size="26" fill="#64748b">tooling repo</text><rect x="940" y="430" width="310" height="255" rx="28" fill="#fff1f2" stroke="#e11d48" stroke-width="4"/>
<text x="974" y="488" class="label" font-size="38" font-weight="760" fill="#334155">Pharmax</text>
<text x="974" y="534" class="label" font-size="26" fill="#64748b">workflow app</text><path d="M305 745 C460 860, 900 860, 1095 745" fill="none" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
<text x="330" y="905" class="label" font-size="34" font-weight="760" fill="#0f172a">Different repos create different pressure.</text>
  <text x="88" y="1288" font-size="38" font-weight="800" fill="#0f172a" class="label">If FRAME only works on the easy repo, it has not</text>
<text x="88" y="1335" font-size="38" font-weight="800" fill="#0f172a" class="label">earned trust.</text>
</svg>