# FRAME Rules Schema -- v0.3.0
# How to work safely in this repo. Commands, constraints, policies.
# Machine contract: schemas/json/rules.schema.json

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://frame.dev/schemas/0.3.0/rules.schema.json"
title: "FRAME Rules"
description: "How to work safely in this repo. Commands, constraints, policies, and triggers that need human approval."
type: object
additionalProperties: false
required: [frame]
properties:
  frame:
    allOf:
      - $ref: "./frame.schema.json#/$defs/frame_header"
      - type: object
        properties:
          file:
            const: rules
          role:
            const: project_instruction_blueprint

  # --- GOVERNANCE LEVEL ---
  # Controls how aggressively Haxaml enforces rules. Does NOT affect mechanical validator (always runs).
  governance_level:
    type: string
    enum: [relaxed, normal, strict]
    default: normal

  # --- RULES ---
  # Core behavioral constraints. Each has an id for cross-referencing.
  rules:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, rule]
      properties:
        id:
          $ref: "./frame.schema.json#/$defs/stable_id"
        rule:
          type: string
          maxLength: 500
        links:
          $ref: "./frame.schema.json#/$defs/links"

  # --- POLICIES ---
  # Durable project policies (role access, lifecycle, audit, auth). Moved from Facts.
  policies:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, name, rule]
      properties:
        id:
          $ref: "./frame.schema.json#/$defs/stable_id"
        name:
          type: string
          maxLength: 150
        rule:
          type: string
          maxLength: 500
        links:
          $ref: "./frame.schema.json#/$defs/links"

  # --- COMMANDS ---
  # Named shell commands. Keys are names used by command_ref in expect.checks.
  commands:
    type: object
    additionalProperties:
      type: object
      additionalProperties: false
      required: [run, kind, purpose]
      properties:
        run:
          type: string
          maxLength: 500
          description: "Shell command to execute."
        kind:
          type: string
          enum: [setup, verify, run]
          description: "setup=install deps, verify=validation check, run=server/interactive."
        purpose:
          type: string
          maxLength: 300
        links:
          $ref: "./frame.schema.json#/$defs/links"

  # --- CODE STYLE ---
  code_style:
    type: object
    additionalProperties: true
    description: "Formatting, naming, conventions. Advisory limit: 1000 chars total."

  # --- GIT ---
  git:
    type: object
    additionalProperties: true
    description: "Branch strategy, commit style, PR rules. Advisory limit: 1000 chars total."

  # --- DONTS ---
  # Things you must never do. severity: critical (blocks) or warning (flags).
  donts:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, rule]
      properties:
        id:
          $ref: "./frame.schema.json#/$defs/stable_id"
        rule:
          type: string
          maxLength: 300
        severity:
          type: string
          enum: [critical, warning]
          default: critical
        links:
          $ref: "./frame.schema.json#/$defs/links"

  # --- ASK FIRST ---
  # Triggers that need human approval. trigger_type: file_pattern or task_pattern.
  ask_first:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, trigger_type, trigger, reason]
      properties:
        id:
          $ref: "./frame.schema.json#/$defs/stable_id"
        trigger_type:
          type: string
          enum: [file_pattern, task_pattern]
        trigger:
          type: string
          maxLength: 300
        reason:
          type: string
          maxLength: 300
        links:
          $ref: "./frame.schema.json#/$defs/links"

  # --- HINTS ---
  # Skill references, known gotchas, task-specific guidance.
  hints:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, hint]
      properties:
        id:
          $ref: "./frame.schema.json#/$defs/stable_id"
        hint:
          type: string
          maxLength: 300

  evidence:
    $ref: "./frame.schema.json#/$defs/evidence_list"
  links:
    $ref: "./frame.schema.json#/$defs/links"
