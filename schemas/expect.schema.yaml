# expect.yaml JSON Schema — Correctness Contract (FRAME model: E)

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "FRAME Expect"
description: "FRAME expect frontmatter plus the current canonical body blocks."
type: object
additionalProperties: false

required:
  - frame

properties:
  frame:
    allOf:
      - $ref: "./frame.schema.yaml#/$defs/frame_header"
      - type: object
        properties:
          file:
            const: expect
          role:
            const: project_correctness_contract
  outcomes:
    type: object
    additionalProperties:
      $ref: "./frame.schema.yaml#/$defs/statement_entry"
  invariants:
    type: object
    additionalProperties:
      $ref: "./frame.schema.yaml#/$defs/statement_entry"
  done_when:
    type: object
    additionalProperties:
      $ref: "./frame.schema.yaml#/$defs/statement_entry"
  verify:
    type: object
    description: "Verification contract. Prefer command_ref links to rules.commands over repeating command strings."
    additionalProperties:
      $ref: "./frame.schema.yaml#/$defs/verification_entry"
  required_evidence:
    type: array
    items:
      $ref: "./frame.schema.yaml#/$defs/required_evidence_entry"
  handoff:
    type: object
    additionalProperties: true
