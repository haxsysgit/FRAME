$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://frame.dev/schemas/0.1.0/frame.schema.yaml"

title: "FRAME Shared Definitions"
description: "Shared schema pieces used by all FRAME files. These definitions describe the FRAME design language and the linked entry grammar that tools can compose into context later."

$defs:
  frame_header:
    type: object
    description: "Shared FRAME frontmatter. Every FRAME file starts with this header so humans and tools can identify the file, schema contract, role, and review state before reading any file-specific body."
    additionalProperties: false
    required:
      - file
      - schema_version
      - role
      - status
    properties:
      file:
        type: string
      schema_version:
        type: string
        const: "0.1.0"
      role:
        type: string
      representation_scope:
        type:
          - string
          - "null"
        enum:
          - baseline_project
          - execution_record
          - handoff
          - mixed
          - null
        description: "What kind of context this FRAME file primarily represents. Baseline project packs should usually use baseline_project; Acts commonly uses execution_record or handoff."
      status:
        type: string
        enum:
          - draft
          - active
          - deprecated
      last_reviewed:
        type:
          - string
          - "null"
        format: date
      updated_by:
        type:
          - string
          - "null"
      update_reason:
        type:
          - string
          - "null"

  ref:
    type: string
    minLength: 1
    description: "Canonical FRAME ref, usually dotted like rules.commands.backend_test_auth."

  stable_id:
    type: string
    minLength: 1
    description: "Stable id for addressable list entries."

  link:
    type: object
    additionalProperties: false
    required:
      - rel
      - ref
    properties:
      rel:
        type: string
        minLength: 1
      ref:
        $ref: "#/$defs/ref"

  links:
    type: array
    items:
      $ref: "#/$defs/link"

  confidence:
    type: string
    enum:
      - unknown
      - low
      - medium
      - high

  evidence:
    type: object
    description: "A short reason to trust a FRAME claim. Evidence points to a source and may also point back to canonical refs."
    additionalProperties: false
    properties:
      id:
        $ref: "#/$defs/stable_id"
      source:
        type:
          - string
          - "null"
      why:
        type:
          - string
          - "null"
      refs:
        type: array
        items:
          $ref: "#/$defs/ref"
      checked_at:
        type:
          - string
          - "null"
        format: date-time
      confidence:
        $ref: "#/$defs/confidence"

  evidence_list:
    type: array
    items:
      $ref: "#/$defs/evidence"

  text_entry:
    type: object
    additionalProperties: false
    required:
      - id
      - text
    properties:
      id:
        $ref: "#/$defs/stable_id"
      text:
        type: string
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  text_entry_or_string:
    oneOf:
      - type: string
      - $ref: "#/$defs/text_entry"

  question_entry:
    type: object
    additionalProperties: false
    required:
      - id
      - trigger
      - question
    properties:
      id:
        $ref: "#/$defs/stable_id"
      trigger:
        type: string
      question:
        type: string
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  hint_entry:
    type: object
    additionalProperties: false
    required:
      - id
      - trigger
      - hint
    properties:
      id:
        $ref: "#/$defs/stable_id"
      trigger:
        type: string
      hint:
        type: string
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  statement_entry:
    type: object
    additionalProperties: false
    required:
      - summary
    properties:
      summary:
        type: string
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  project_profile_entry:
    type: object
    description: "Compact project-level shape signal. This prevents tiny repos from being over-modeled and gives tools an early routing hint."
    additionalProperties: false
    required:
      - summary
      - family
      - system_role
      - complexity
    properties:
      summary:
        type: string
      family:
        type: string
        description: "Human-readable project family, e.g. cli-tool, web-app, backend-api, monorepo, sdk-library."
      system_role:
        type: string
        description: "What role this project plays as software, not its marketing pitch."
      complexity:
        type: string
        enum:
          - tiny
          - small
          - medium
          - large
          - unknown
      scale_guidance:
        type:
          - string
          - "null"
        description: "How aggressively FRAME should compress or expand this repo's representation."
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  quirk_entry:
    type: object
    description: "Settled but easy-to-misread project truth: doc/code drift, fixture adaptation, generated noise, hardcoded local assumptions, or similar hazards."
    additionalProperties: false
    required:
      - id
      - summary
      - hazard
    properties:
      id:
        $ref: "#/$defs/stable_id"
      summary:
        type: string
      hazard:
        type: string
        description: "What a future human/tool is likely to get wrong if this quirk is missed."
      kind:
        type: string
        enum:
          - doc_code_drift
          - fixture_adaptation
          - generated_or_cached_noise
          - environment_assumption
          - source_layout_surprise
          - operational_caveat
          - other
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  source_truth_entry:
    type: object
    description: "Ranks competing truth sources when files disagree or have different authority."
    additionalProperties: false
    required:
      - id
      - source
      - authority
      - reason
    properties:
      id:
        $ref: "#/$defs/stable_id"
      source:
        type: string
      authority:
        type: string
        enum:
          - canonical
          - strong
          - supporting
          - stale_or_suspect
          - generated
          - unknown
      reason:
        type: string
      supersedes:
        type: array
        items:
          type: string
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  policy_entry:
    type: object
    description: "Lightweight reusable project policy, workflow, lifecycle, or role rule. Use this for durable operational truth that would otherwise be repeated across facts, rules, map, and expect."
    additionalProperties: false
    required:
      - id
      - summary
      - kind
    properties:
      id:
        $ref: "#/$defs/stable_id"
      summary:
        type: string
      kind:
        type: string
        enum:
          - role_policy
          - workflow_policy
          - lifecycle_constraint
          - safety_constraint
          - data_integrity
          - environment_policy
          - other
      applies_to:
        type: array
        description: "Repo surfaces, roles, workflows, files, or components this policy affects."
        items:
          type: string
      source_refs:
        type: array
        description: "Optional refs to source_truth, map paths, or evidence entries that support this policy."
        items:
          $ref: "#/$defs/ref"
      expect_refs:
        type: array
        description: "Optional refs to expect outcomes, invariants, or verification entries that prove this policy is respected."
        items:
          $ref: "#/$defs/ref"
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  command_entry:
    type: object
    additionalProperties: false
    required:
      - run
      - kind
    properties:
      run:
        type: string
      kind:
        type: string
        enum:
          - setup
          - run
          - inspect
          - test
          - build
          - verify
          - deploy
          - maintenance
      purpose:
        type:
          - string
          - "null"
      when_to_use:
        type:
          - string
          - "null"
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  verification_entry:
    type: object
    description: "Verification meaning. It may point to a rules.commands ref, but should not duplicate the command inventory unless the command is intentionally absent."
    additionalProperties: false
    required:
      - summary
    properties:
      summary:
        type: string
      command_ref:
        type:
          - string
          - "null"
        description: "Optional ref to rules.commands.<id>; prefer this over repeating command strings."
      proof_type:
        type: string
        enum:
          - automated_test
          - smoke_test
          - manual_check
          - static_check
          - review
          - unavailable
          - unknown
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  path_summary_entry:
    type: object
    additionalProperties: false
    required:
      - path
      - summary
    properties:
      path:
        type: string
      summary:
        type: string
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  classification_entry:
    type: object
    additionalProperties: false
    required:
      - summary
    properties:
      summary:
        type: string
      boundary_type:
        type:
          - string
          - "null"
        enum:
          - entrypoint
          - source
          - test
          - docs
          - config
          - generated
          - state
          - infra
          - package_metadata
          - unknown
          - null
      interface_role:
        type:
          - string
          - "null"
        description: "How tools should treat this boundary: public interface, internal implementation, verification surface, operational support, etc."
      paths:
        type: array
        items:
          type: string
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  managed_path_entry:
    type: object
    additionalProperties: false
    required:
      - path
      - reason
    properties:
      path:
        type: string
      reason:
        type: string
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  ambiguity_entry:
    type: object
    additionalProperties: false
    required:
      - id
      - question
    properties:
      id:
        $ref: "#/$defs/stable_id"
      question:
        type: string
      status:
        type: string
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  reflect_entry:
    type: object
    additionalProperties: false
    required:
      - id
      - finding
    properties:
      id:
        $ref: "#/$defs/stable_id"
      finding:
        type: string
      recommendation:
        type:
          - string
          - "null"
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  action_entry:
    type: object
    additionalProperties: false
    required:
      - id
      - summary
    properties:
      id:
        $ref: "#/$defs/stable_id"
      summary:
        type: string
      status:
        type:
          - string
          - "null"
      outcome:
        type:
          - string
          - "null"
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  blocker_entry:
    type: object
    additionalProperties: false
    required:
      - id
      - summary
    properties:
      id:
        $ref: "#/$defs/stable_id"
      summary:
        type: string
      next_step:
        type:
          - string
          - "null"
      links:
        $ref: "#/$defs/links"
      evidence:
        $ref: "#/$defs/evidence_list"

  required_evidence_entry:
    type: object
    additionalProperties: false
    required:
      - id
      - expectation
    properties:
      id:
        $ref: "#/$defs/stable_id"
      expectation:
        type: string
      refs:
        type: array
        items:
          $ref: "#/$defs/ref"
      links:
        $ref: "#/$defs/links"

  field_bucket:
    type: string
    enum:
      - info
      - type
      - rule
      - place
      - check
      - log
      - link
      - proof
      - unknown

  field_strength:
    type: integer
    minimum: 0
    maximum: 3

  field_design_card:
    type: object
    additionalProperties: false
    required:
      - name
      - bucket
      - owner_file
      - strength
      - meaning
      - shape
      - used_by_tools_for
      - must_not_contain
    properties:
      name:
        type: string
      bucket:
        $ref: "#/$defs/field_bucket"
      owner_file:
        type: string
        enum:
          - facts
          - rules
          - acts
          - map
          - expect
      strength:
        $ref: "#/$defs/field_strength"
      meaning:
        type: string
      shape:
        type: string
      can_be_unknown:
        type: boolean
        default: false
      used_by_tools_for:
        type: array
        items:
          type: string
      must_not_contain:
        type: array
        items:
          type: string
      evidence:
        $ref: "#/$defs/evidence_list"

  relationship_condition:
    type: object
    additionalProperties: false
    required:
      - fact_path
      - operator
    properties:
      fact_path:
        type: string
      operator:
        type: string
        enum:
          - exists
          - missing
          - equals
          - not_equals
          - includes
      value:
        type:
          - string
          - number
          - boolean
          - "null"
          - array
