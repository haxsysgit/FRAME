# acts.yaml JSON Schema — Project Acts (FRAME model: A)

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "FRAME Acts"
description: "FRAME acts frontmatter plus checked execution/work-history blocks. Acts is not baseline project representation."
type: object
additionalProperties: false

required:
  - frame

properties:
  frame:
    allOf:
      - $ref: "./frame.schema.yaml#/$defs/frame_header"
      - type: object
        properties:
          file:
            const: acts
          role:
            const: checked_activity_record
  representation_policy:
    type: object
    description: "Clarifies that acts records checked work/handoff state and should not be forced to describe stable repo structure."
    additionalProperties: false
    properties:
      baseline_project_representation:
        type: boolean
        const: false
      note:
        type:
          - string
          - "null"
  action_overview:
    type: object
    additionalProperties: true
  reflect_loop:
    type: array
    items:
      $ref: "./frame.schema.yaml#/$defs/reflect_entry"
  actions:
    type: array
    items:
      $ref: "./frame.schema.yaml#/$defs/action_entry"
  blockers:
    type: array
    items:
      $ref: "./frame.schema.yaml#/$defs/blocker_entry"
  archive:
    type: object
    additionalProperties: true
