# rules.yaml JSON Schema — Project Instruction Blueprint (FRAME model: R)

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "FRAME Rules"
description: "FRAME rules frontmatter plus the current canonical body blocks."
type: object
additionalProperties: false

required:
  - frame

properties:
  frame:
    allOf:
      - $ref: "./frame.schema.yaml#/$defs/frame_header"
      - type: object
        properties:
          file:
            const: rules
          role:
            const: project_instruction_blueprint
  critical_rules:
    type: array
    items:
      $ref: "./frame.schema.yaml#/$defs/text_entry_or_string"
  commands:
    type: object
    description: "Command inventory only. Verification meaning belongs in expect.verify via command_ref to avoid duplicated command prose."
    additionalProperties:
      $ref: "./frame.schema.yaml#/$defs/command_entry"
  code_style:
    type: array
    items:
      $ref: "./frame.schema.yaml#/$defs/text_entry_or_string"
  git_workflow:
    type: array
    items:
      $ref: "./frame.schema.yaml#/$defs/text_entry_or_string"
  negative_instructions:
    type: array
    items:
      $ref: "./frame.schema.yaml#/$defs/text_entry_or_string"
  stop_and_ask:
    type: array
    items:
      $ref: "./frame.schema.yaml#/$defs/question_entry"
  skill_hints:
    type: array
    items:
      $ref: "./frame.schema.yaml#/$defs/hint_entry"
  evidence:
    $ref: "./frame.schema.yaml#/$defs/evidence_list"
