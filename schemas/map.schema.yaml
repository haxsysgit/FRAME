$schema: "https://json-schema.org/draft/2020-12/schema"
title: "FRAME Map"
description: "FRAME map frontmatter plus the current canonical body blocks."
type: object
additionalProperties: false

required:
  - frame

properties:
  frame:
    allOf:
      - $ref: "./frame.schema.yaml#/$defs/frame_header"
      - type: object
        properties:
          file:
            const: map
          role:
            const: repo_context_map
  roots:
    type: object
    additionalProperties:
      $ref: "./frame.schema.yaml#/$defs/path_summary_entry"
  paths:
    type: object
    additionalProperties:
      $ref: "./frame.schema.yaml#/$defs/statement_entry"
  classifications:
    type: object
    additionalProperties:
      $ref: "./frame.schema.yaml#/$defs/classification_entry"
  access_points:
    type: object
    additionalProperties:
      $ref: "./frame.schema.yaml#/$defs/path_summary_entry"
  managed_paths:
    type: object
    additionalProperties:
      $ref: "./frame.schema.yaml#/$defs/managed_path_entry"
  unmapped_paths:
    type: array
    items:
      type: string
  evidence:
    $ref: "./frame.schema.yaml#/$defs/evidence_list"
