[meta]
status = "complete"
candidate = "frame-five-part-v0"
candidate_version = "v0"
fixture = "autopahe"
fixture_family = "cli-tools"
fixture_system_role = "anime download/stream assistant"
evaluator = "hermes"
scale_max = 5

[phase_assessment]
phase_1 = "structural_fit"
phase_2 = "operational_usefulness"
phase_3 = "pressure_cost"
advance_recommendation = "hold"

[weights]
coverage = 1.5
clarity = 1.5
stability = 1.5
agent_usefulness = 1.25
retrieval_usefulness = 1.25
adoptability = 1.25
bloat_resistance = 1.5
token_efficiency = 1.5

[scores]
coverage = 4
clarity = 3
stability = 3
agent_usefulness = 4
retrieval_usefulness = 4
adoptability = 3
bloat_resistance = 2
token_efficiency = 2

[phase_notes]
phase_1 = "This fixture gives facts, rules, map, and expect real work to do, so the candidate clears the structural gate better than it did on organize. But the fit is only moderately clean: acts is still weak, and several boundaries blur once setup commands, path logic, and verification all matter."
phase_2 = "For a medium CLI repo with runtime prerequisites, path logic, updater behavior, and a few key tests, the representation would likely help an agent orient faster and avoid obvious mistakes."
phase_3 = "The cost problem is still real. The five-part split stores autopahe, but it also encourages repeated restatement of surfaces and command/verification paths, which drags down bloat resistance and token efficiency."

[notes]
summary = "Moderately strong medium-repo fit, but not a clean win. The candidate represents autopahe better than tiny fixtures, yet it still pays too much in overlap and keeps revealing that acts is not a natural baseline repo-representation part."
coverage = "The candidate captures autopahe's identity, package/CLI shape, Playwright prerequisite, cross-platform state paths, updater split, and main source surfaces without obvious holes."
clarity = "Facts, rules, map, and expect are all usable here, but evaluator placement is still not crisp. Setup commands and runtime constraints drift between rules and expect, while major surfaces appear in both facts.architecture and map.paths."
stability = "Autopahe shows the candidate can scale up to a medium Python CLI/tooling repo, but the earlier organize pass already showed it does not scale down gracefully. That makes the structure workable across shapes, not convincingly stable across them."
agent_usefulness = "An agent would benefit from seeing Playwright/browser setup, centralized path helpers, fixture-specific import conventions, updater mode split, and the separation between cli.py and auto_pahe.py before making edits."
retrieval_usefulness = "The fit turns scattered truths from README, pyproject, CLI code, path/config helpers, updater logic, and tests into a more reusable index. It would reduce repo scavenging for setup, persistence, and entrypoint questions."
adoptability = "A disciplined team could maintain this fit for autopahe, but only if they resist copying long command inventories and feature lists forward. The five-file burden is still noticeable for a project of this size."
bloat_resistance = "This candidate resists some over-modeling, but not enough. Autopahe immediately creates overlap between facts and map, and between rules.commands and expect.verify; acts adds another file with little enduring project truth."
token_efficiency = "The value is real, but too much of it comes with repetition. The fit spends extra text re-stating surfaces, setup flows, and verification paths that are already anchored elsewhere."

