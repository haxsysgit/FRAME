[friction]
forced_fits = [
  "Acts remains largely synthetic for baseline repo representation; autopahe still does not give it durable project truth beyond the evaluation activity itself.",
  "Structural quirks like the fixture-specific example_projects.autopahe import prefix and checked-in noise paths do not have a very crisp first-class home."
]
missing_semantics = [
  "Need a cleaner place for structural quirks or drift hazards that are neither plain facts nor agent instructions.",
  "Need a sharper distinction between descriptive operating truth and prescriptive rule when setup/runtime constraints are both."
]
redundant_fields = [
  "facts.architecture.major_surfaces vs map.paths for the same repo boundaries",
  "rules.commands vs expect.verify for the same setup and smoke-test routes",
  "acts.action_overview/recommendation text vs the fit report's discussion of why acts is thin"
]
stale_risk_fields = [
  "Long command inventories copied from README installation and Docker sections",
  "Feature lists that mirror README usage examples instead of only stable structural truth",
  "Secondary noise-path listings like dist/, data/, __pycache__/, and historical docs if they are maintained too literally"
]
extension_candidates = [
  "A compact structural-quirks or drift-hazards block",
  "Stronger anti-duplication guidance between commands and verification",
  "Treat acts as execution-memory or session-history, not mandatory baseline repo representation"
]

[recommendation]
keep = [
  "Facts for project identity, runtime shape, and persistence truth",
  "Rules for real setup and operating constraints",
  "Map for entrypoints and major module boundaries",
  "Expect for concrete repo-level verification anchors"
]
change = [
  "Tighten boundaries between facts and map on major surfaces",
  "Reduce command/verification duplication across rules and expect",
  "Stop treating acts as if every repo naturally supplies durable activity-state worth storing"
]
avoid = [
  "Do not score this as excellent just because autopahe is rich enough to fill most sections.",
  "Do not let Phase 2 usefulness hide the Phase 3 repetition cost.",
  "Do not reward repeated README restatement as schema fitness."
]
