[friction]
forced_fits = [
  "acts is mostly meta-evaluation residue on this fixture instead of durable project reality",
  "facts/map/expect all want to own the same organize.py entry-surface truth",
  "rules.commands and expect.verify both want to restate the same help command because the repo has only one cheap verification surface"
]
missing_semantics = [
  "no clean compact slot for recurring structural drift hazards like README examples naming file_manager.py while the repo ships organize.py",
  "no built-in tiny-repo mode, so evaluators have to self-police how much of the five-part split is actually justified"
]
redundant_fields = [
  "facts.architecture.entrypoint + map.paths.organize_script + map.access_points.parser_block all point at the same script surface",
  "rules.commands.help + expect.verify.help_command duplicate the same verification action",
  "README/code drift appears in facts.architecture.notable_quirks, rules.critical_rules, map.paths.readme, and expect.done_when"
]
stale_risk_fields = [
  "command examples copied from README or argparse help",
  "verification guidance that mirrors the current one-command reality",
  "acts entries that capture evaluation-time checks instead of stable repo truth"
]
extension_candidates = [
  "a compact drift-or-quirks slot would fit organize better than smearing the same mismatch across multiple files",
  "an explicit tiny-repo compression rule would be cleaner than pretending all five files pull equal weight here"
]

[recommendation]
keep = [
  "facts for stable identity, stack, and repo-shape truth",
  "map for source-of-truth navigation when there are genuinely multiple meaningful surfaces",
  "expect for real verification contracts on repos that have richer correctness surfaces"
]
change = [
  "treat Phase 1 gate as failed here because clarity and stability both scored 2",
  "add or permit a compact mode for tiny repos so one-script fixtures do not have to fake five equally meaningful layers",
  "reduce core overlap between facts, map, rules, and expect around entrypoints and verification commands"
]
avoid = [
  "do not count mere storability as structural success",
  "do not use acts as filler when the repo has no durable activity surface",
  "do not reward repeated organize.py/help/drift restatements as completeness"
]
