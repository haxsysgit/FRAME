[meta]
status = "complete"
candidate = "frame-five-part-v0"
candidate_version = "v0"
fixture = "organize"
fixture_family = "cli-tools"
fixture_system_role = "file organization helper"
evaluator = "hermes-subagent"
scale_max = 5

[phase_assessment]
phase_1 = "structural_fit"
phase_2 = "operational_usefulness"
phase_3 = "pressure_cost"
advance_recommendation = "candidate_rejected"

[weights]
coverage = 1.5
clarity = 1.5
stability = 1.5
agent_usefulness = 1.25
retrieval_usefulness = 1.25
adoptability = 1.25
bloat_resistance = 1.5
token_efficiency = 1.5

[scores]
coverage = 3
clarity = 2
stability = 2
agent_usefulness = 3
retrieval_usefulness = 2
adoptability = 2
bloat_resistance = 1
token_efficiency = 1

[phase_notes]
phase_1 = "Coverage is only workable, while clarity and scale-down stability both fail the gate for a one-script repo. The candidate can store organize, but the fit is structurally awkward rather than clean."
phase_2 = "The five-part fit still gives some value by surfacing the real entrypoint, README/code drift, destructive filesystem behavior, and lack of tests. That usefulness is limited because the repo itself is tiny and the same truths are easy to recover directly."
phase_3 = "Cost pressure is the clearest failure. The organize fit repeats the same tiny set of truths across facts, rules, map, and expect, while acts mostly records framework overhead rather than project reality."

[notes]
summary = "Structurally weak scale-down fit. The schema can represent organize, but Phase 1 is not earned cleanly and Phase 3 is poor because five files spread a one-script repo across repetitive buckets."
coverage = "Most important reality fits somewhere: tiny Python CLI, README/code drift, destructive file moves, and minimal verification surface. Coverage is only moderate because acts has no natural project truth to carry and recurring drift hazards have no clean dedicated home."
clarity = "Boundary confusion is persistent. organize.py as the main surface appears in facts.architecture, map.paths, and expect.verify; help-command truth appears in rules.commands and expect.verify; README drift gets threaded through multiple parts instead of landing in one obvious place."
stability = "organize is the scale-down probe, and the candidate needs special restraint just to avoid looking silly on it. A schema that only works when evaluators aggressively compress facts, map, expect, and acts is not stable across smaller fixtures."
agent_usefulness = "An agent would make somewhat better choices after reading the fit: it would know to trust argparse over README examples, avoid the hardcoded Linux default path, and treat file-moving commands as destructive."
retrieval_usefulness = "There is some indexing value, but not much leverage. The repo already concentrates truth in README.md and organize.py, and the five-part fit does not reduce lookup enough to justify all of its splits."
adoptability = "Maintaining five FRAME files for a repo with organize.py, README.md, and LICENSE would feel like ceremony. The stale-risk is especially high for command examples, drift notes, and verification instructions that are all copies of a very small source base."
bloat_resistance = "This candidate resists bloat poorly on tiny repos. organize tempts the schema to restate the same script path, safety note, and help command across multiple core files, and acts becomes filler."
token_efficiency = "Value per token is weak here. The fit spends five documents to describe one script, one README, one path hazard, one doc-drift issue, and one cheap verification command."

