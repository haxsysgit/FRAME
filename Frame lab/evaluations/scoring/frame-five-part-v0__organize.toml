[meta]
status = "complete"
candidate = "frame-five-part-v0"
candidate_version = "v0"
fixture = "organize"
fixture_family = "cli-tools"
fixture_system_role = "file organization helper"
evaluator = "hermes"
scale_max = 5

[phase_assessment]
phase_1 = "structural_fit"
phase_2 = "operational_usefulness"
phase_3 = "pressure_cost"
advance_recommendation = "hold"

[weights]
coverage = 1.5
clarity = 1.5
stability = 1.5
agent_usefulness = 1.25
retrieval_usefulness = 1.25
adoptability = 1.25
bloat_resistance = 1.5
token_efficiency = 1.5

[scores]
coverage = 3
clarity = 2
stability = 3
agent_usefulness = 3
retrieval_usefulness = 3
adoptability = 2
bloat_resistance = 2
token_efficiency = 2

[phase_notes]
phase_1 = "The candidate can represent organize's identity, stack, layout, CLI surface, and real quirks, but it already shows placement strain on a tiny repo."
phase_2 = "The representation would help an agent a bit by surfacing the real script name, path risk, and lack of tests, but the help is modest because the repo itself is so small."
phase_3 = "This is where the candidate struggles most: five parts feel expensive for a repo that is basically one script and a README."

[notes]
summary = "Structurally workable but visibly overbuilt for a tiny single-script fixture. Useful as a warning pass, not a clean win."
coverage = "Facts, rules, map, and expect can hold most important organize truth. Acts adds almost no project-representation value here."
clarity = "Facts vs map vs expect can blur on a tiny repo, and acts feels out of place for project representation."
stability = "The candidate probably survives this fixture, but only if tiny repos are allowed very compact usage."
agent_usefulness = "An agent would benefit from knowing the real script name, README/code drift, filesystem-mutation risk, and the absence of tests."
retrieval_usefulness = "The representation would save a future agent from rereading the tiny repo every time, but the gain is moderate because the repo is already small."
adoptability = "Maintaining five FRAME files for this project would likely feel like too much ceremony."
bloat_resistance = "The candidate invites unnecessary splitting and repeated restatement on a repo with almost no internal structure."
token_efficiency = "The cost-to-signal ratio is weak here unless the fit style is aggressively compressed."

