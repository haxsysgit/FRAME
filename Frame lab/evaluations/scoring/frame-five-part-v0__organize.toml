[friction]
forced_fits = [
  "Acts has almost no natural project-representation content on this fixture.",
  "Facts/map/expect can start repeating each other when the repo only has one real code surface."
]
missing_semantics = [
  "Need a cleaner way to record recurring structural quirks like doc/code drift.",
  "Need an explicit compact-mode discipline for tiny repos so FRAME can scale down without ceremony."
]
redundant_fields = [
  "facts.architecture vs map.roots/paths on a one-script repo",
  "rules.commands vs expect.verify when there is only one cheap verification route"
]
stale_risk_fields = [
  "Detailed flag-by-flag restatements copied from README",
  "Task-level correctness notes stored as permanent project truth"
]
extension_candidates = [
  "A small, explicit place for structural quirks or drift notes",
  "A compact fixture profile or size/shape marker to guide how much FRAME detail is justified"
]

[recommendation]
keep = [
  "Facts for identity, stack, and stable project truths",
  "Map for explicit navigation and key paths",
  "Expect for real verification surface and correctness checks"
]
change = [
  "Enforce a much leaner tiny-repo fit style",
  "Keep acts separate from project representation concerns",
  "Clarify boundaries between facts, map, and expect for very small repos"
]
avoid = [
  "Do not reward the candidate for merely finding a place to store everything.",
  "Do not let tiny fixtures justify verbose FRAME documents that exceed the repo's own complexity."
]
