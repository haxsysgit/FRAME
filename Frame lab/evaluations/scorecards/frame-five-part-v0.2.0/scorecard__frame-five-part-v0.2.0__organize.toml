retrieval_usefulness = ["Frame lab/evaluations/fits/frame-five-part-v0.2.0/organize/map.yaml", "Frame lab/evaluations/fits/frame-five-part-v0.2.0/organize/facts.yaml"]
cross_link_quality = ["Frame lab/evaluations/fits/frame-five-part-v0.2.0/organize/facts.yaml", "Frame lab/evaluations/fits/frame-five-part-v0.2.0/organize/acts.yaml", "Frame lab/evaluations/fits/frame-five-part-v0.2.0/organize/expect.yaml"]
