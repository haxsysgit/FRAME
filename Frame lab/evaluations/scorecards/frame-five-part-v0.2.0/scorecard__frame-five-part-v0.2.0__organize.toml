[friction]
forced_fits = ["A five-file pack is still a noticeable amount of ceremony for a repo that is basically organize.py plus README and LICENSE."]
missing_semantics = []
redundant_fields = []
stale_risk_fields = ["facts.quirks.readme_name_drift and related README-derived notes will need updates if the docs are corrected."]
extension_candidates = []
name_problems = []
link_gaps = ["The current fit does not add refs for scorecard/report artifacts because the schemas model project truth rather than evaluation packaging."]
governance_gaps = ["Mutating organize_by_relation and organize_by_extension flows were not both fully replayed end-to-end in tempdir during this pass; relation grouping was checked directly with -m and create/delete were checked directly with -c/-d."]

[acts_review]
role_fit = "Acts behaves correctly here as run history for inspection, smoke checks, and schema validation rather than duplicated project truth."
input_summary_quality = "Good: each run states what repo files, schemas, or commands were read before work."
output_summary_quality = "Good: each run records concrete outcomes, including the help-command warning and the tempdir before/after behavior."
touched_surfaces_quality = "Good: runs point back to the real repo surfaces and managed-path areas that were inspected or exercised."
changed_facts_quality = "Good: changed_facts stays focused on the fit truths that were established or updated."
rules_followed_quality = "Good: the run history explicitly records code-over-README and safe-temp-path discipline."
expect_links_quality = "Good: the runs link directly to cli_help, match_groups, and extension_create_delete checks."

[recommendation]
keep = ["The simplified top-level names", "Acts as summary + runs + blockers + handoff", "Link-first ownership across facts, rules, map, expect, and acts"]
change = ["Keep emphasizing compressed authoring style for tiny repos so the five-file overhead does not grow back through prose."]
avoid = ["Reintroducing reflective Acts blocks or abstract names that hide where truth belongs."]
