[phase_notes]
phase_1 = "The candidate represents autopahe cleanly as a medium Python CLI/package with browser setup, persistence helpers, tests, Docker support, and checked-in state hazards. Simplified names reduce placement ambiguity compared with older labels."
phase_2 = "The five parts interact well: Facts names the stable truth, Rules defines operating constraints, Map routes to concrete repo surfaces, Expect links command-based proof, and Acts stays focused on run history."
phase_3 = "The fit stays lean under pressure. The fixture's browser and state complexity did not force new core blocks, and links reduced repetition across files."

[notes]
summary = "frame-five-part-v0.2.0 fits autopahe strongly. The simplified names improve readability, cross-links are cleaner, and the new Acts shape behaves like useful run history instead of duplicate project summary."
coverage = "The fit captures package metadata, runtime entrypoints, path/config helpers, import quirks, generated-state noise, tests, Docker assets, and browser handoff behavior without obvious gaps."
clarity = "profile, sources, quirks, groups, entrypoints, checks, and proof are easier to place at a glance than the older field names."
stability = "The same five-part shape that fits small tools still works on this richer CLI/package fixture without special-case structural growth."
typed_design = "Entries have stable ownership, obvious ids, and reusable links. The shape maps cleanly to typed models and JSON Schema."
agent_usefulness = "An agent reading this fit is less likely to break CLI compatibility, hardcode paths, or mistake user-state noise for source truth."
retrieval_usefulness = "The Map and source ranking make it easy to jump from a question to pyproject, CLI modules, path helpers, tests, or Docker assets."
cross_link_quality = "Links connect policies, quirks, paths, checks, and run history cleanly across all five parts with little duplicated prose."
governance_usefulness = "Acts plus Expect make reviewable proof obligations visible, but this pass mostly modeled checks rather than executing them, so governance value is real but not full proof yet."
adoptability = "A maintainer could plausibly keep this fit current because the fields are obvious and reuse refs instead of repeating long descriptions."
bloat_resistance = "The candidate handled browser/setup complexity with ordinary rules, quirks, and checks rather than adding app-specific schema surface."
token_efficiency = "The fit is still sizable because the fixture is medium and noisy, but links prevent much larger repetition."
name_clarity = "The v0.2.0 names are consistently obvious on sight and reduce schema-translation overhead for both humans and tools."

