[phase_notes]
phase_1 = "The simplified v0.2.0 shape cleanly fits Pharmax. Facts captures stable repo truth, Rules captures how to work safely, Map captures the split backend/frontend surface, Expect captures proof obligations, and Acts now reads clearly as run history instead of duplicate project description."
phase_2 = "The five parts interact well. The fit links policy to checks, checks to commands, commands to repo entrypoints, and run history back to changed facts and followed rules. That is materially useful for agent routing and review."
phase_3 = "The candidate stays fairly lean under a workflow-heavy full-stack app. Some medium-app pressure remains around workflow and deployment drift, but v0.2.0's simpler names and link-first design reduce the repetition that showed up in the older fit."

[notes]
summary = "frame-five-part-v0.2.0 fits Pharmax strongly. The simplified names improve readability immediately, the new Acts shape is much better for run history, and link-first ownership keeps the full-stack workflow pressure under control."
coverage = "The candidate captures the real repo surfaces: backend routes and services, frontend views and router, env-driven persistence, smoke scripts, audit surfaces, and documentation drift."
clarity = "The simplified names are obvious on sight. Profile, sources, quirks, rules, groups, entrypoints, checks, and proof all reduce placement confusion compared with the older naming."
stability = "The shape still looks stable across small and medium fixtures, but Pharmax shows that workflow-heavy apps will continue stressing policy and verification links more than tiny repos do."
typed_design = "The fit stays typed and tool-friendly: small reusable entry shapes, stable ids, dotted refs, and minimal catch-all structure outside intentionally flexible sections like identity or handoff."
agent_usefulness = "An agent can route quickly to auth, products, invoices, stock, dashboard, or deployment surfaces and can see which checks and rules matter before editing."
retrieval_usefulness = "Cross-links reduce scavenger hunts. Commands link to checks, checks link to outcomes and policies, and map entrypoints make the backend/frontend split explicit."
cross_link_quality = "This is one of the strongest parts of the fit. Facts, Rules, Map, Expect, and Acts all point to each other in useful ways rather than sitting as isolated files."
governance_usefulness = "The new Acts run entry shape improves traceability, but this pass is still more inspection history than executed app-proof, so governance is strong but not perfect yet."
adoptability = "A real team could maintain this representation. Pharmax is detailed enough to create upkeep pressure, but the simplified names and link-first style keep it plausible."
bloat_resistance = "The candidate handled Pharmax without adding app-specific core blocks. Workflow pressure was absorbed with policies, checks, and links rather than schema sprawl."
token_efficiency = "The fit is still substantial because the fixture is a real full-stack app, but v0.2.0 trims repetition better than the prior version."
name_clarity = "Name clarity is excellent. The new labels are easier for normal developers and typed tooling to understand immediately."

