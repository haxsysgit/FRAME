[friction]
forced_fits = ["Deployment docs mention render.yaml, but the file was not present in the inspected fixture snapshot."]
missing_semantics = ["No major missing core semantic blocked the fit; policy and check links were enough for Pharmax."]
redundant_fields = ["Some workflow detail still appears from different angles across facts policies, map entrypoints, and expect checks, but links keep the repetition bounded."]
stale_risk_fields = ["role names", "deployment assumptions", "smoke command inventory"]
extension_candidates = ["None required from this fixture round."]
name_problems = []
link_gaps = ["A future combined score or provenance index could make scorecard-to-fit navigation even tighter."]
governance_gaps = ["Runtime smoke execution was not attempted here because the task only required fit artifact validation, not app boot verification."]

[acts_review]
role_fit = "Acts behaves correctly as run history rather than duplicate project truth, but most of this run is inspection and fit validation, not executed workflow proof."
input_summary_quality = "Strong. The run records exactly which candidate, schemas, rubric, prior fit, and fixture surfaces were read."
output_summary_quality = "Strong. It states the written artifacts and the validation result without restating the whole repo model."
touched_surfaces_quality = "Strong. Touched refs point to the real backend, frontend, docs, and config anchors that informed the fit."
changed_facts_quality = "Strong. The run points back to the main facts and policies that were materially established by the fit."
rules_followed_quality = "Strong. The run links back to the working rules that constrained the fitting process."
expect_links_quality = "Good. Schema validation and review checks are referenced directly from the run, but runtime workflow proof was not executed in this pass."

[recommendation]
keep = ["simplified names", "link-first ownership", "Acts as summary plus runs plus blockers plus handoff", "command_ref-based checks"]
change = ["Keep testing the same shape on more workflow-heavy fixtures to confirm policy/check links remain sufficient without adding new core blocks."]
avoid = ["reintroducing abstract names", "turning Acts back into project summary prose", "adding app-specific schema blocks for every workflow detail"]
