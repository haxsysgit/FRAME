ambiguities:
  - id: amb_browser_core
    question: Is browser automation intended as the dominant runtime path, or mainly a fallback behind HTTP/cache paths?
    status: open
    evidence:
      - source: Frame lab/fixtures/autopahe/project/README.md:111-132
        why: README presents browser download handoff as a core flow.
        confidence: medium
      - source: Frame lab/fixtures/autopahe/project/auto_pahe.py:437-500
        why: Search path prefers cache/HTTP first and launches browser only when needed.
        confidence: medium
