reflect_loop:
  - id: reflect_adjusted_schema_fit
    finding: Adjusted schema intent cleanly separates stable project truth, command inventory, repository map, expectation contract, and checked activity.
    recommendation: Keep acts.yaml minimal and avoid using it to restate frontend/backend structure.
    links:
      - rel: follows
        ref: rules.negative_instructions.do_not_model_acts_as_baseline
  - id: reflect_full_stack_pressure
    finding: Pharmax needs medium-depth FRAME modeling because important correctness is distributed across backend routes/services/models, frontend route/service surfaces, seed data, and workflow smoke scripts.
    recommendation: Future fits should preserve cross-file links between business workflows, command refs, and path map rather than over-indexing on docs.
  - id: reflect_friction_imports
    finding: The example_projects.pharmax import namespace is the main execution friction in the raw fixture layout.
    recommendation: Verify import path resolution before treating backend commands as runnable in a different checkout/package context.
    links:
      - rel: caveat
        ref: facts.structural_quirks.quirk_example_projects_imports
actions:
  - id: inspected_schemas
    summary: Read candidate FRAME schemas for facts, rules, acts, map, expect, and shared frame definitions.
    status: done
    outcome: Confirmed schema_version must be 0.1.0 and identified allowed fields, required headers, command_ref usage, and acts representation_policy.
  - id: inspected_fixture_docs
    summary: Inspected root README and PROJECT_BRIEF for product purpose, roles, capabilities, stack, setup, and deployment claims.
    status: done
    outcome: Captured core app identity and found doc/code drift around database, Streamlit analytics, and render.yaml presence.
  - id: inspected_backend_surfaces
    summary: Inspected backend pyproject, app entrypoints, config/session, router, invoice workflow/routes, models, tests, and smoke scripts.
    status: done
    outcome: Identified FastAPI/SQLAlchemy app shape, route/service/model split, SQLite/Postgres config, role-based workflows, migration and seed surfaces, and smoke verification commands.
  - id: inspected_frontend_surfaces
    summary: Inspected frontend package metadata, API client, and router configuration.
    status: done
    outcome: Identified Vue 3/Vite/Pinia/Vue Router surfaces, route role metadata, API timeout/auth behavior, build/dev commands, and report/analytics/invoice/product views.
  - id: wrote_fit_files
    summary: Wrote facts.yaml, rules.yaml, acts.yaml, map.yaml, expect.yaml, and a short markdown fit report in the requested evaluation locations.
    status: done
    outcome: Five-part FRAME fit captures project_profile, structural quirks, source truth ranking, command inventory, command_ref verification, map boundaries, and handoff state.
  - id: validated_yaml_shape
    summary: Used write-time YAML linting and a follow-up schema validation script to check fit files against schemas.
    status: done
    outcome: Completed after correcting schema constraints encountered during validation.
