    summary: Backend code imports modules through example_projects.pharmax.Backend... even though fixture root is Frame lab/fixtures/pharmax/project.
    hazard: Running the backend from the fixture may require PYTHONPATH/package layout compatibility; naive local imports from Backend/app may fail if example_projects is absent.
    kind: source_layout_surprise
    evidence:
      - id: ev_import_paths
        source: Backend/app/main.py:5-8; Backend/main.py:1
        why: Entrypoints import example_projects.pharmax.Backend modules.
        refs: []
        checked_at: "2026-06-01T21:53:45Z"
