critical_rules:
  - id: preserve_business_workflow
    text: Treat invoice, stock, access-control, reconciliation, and audit behavior as the highest-risk business workflows; do not change them without reading both route and service layers.
    links:
      - rel: supports
        ref: facts.architecture.business_workflows
  - id: respect_role_policy
    text: Preserve ADMIN/CASHIER/STAFF permissions across backend require_role dependencies and frontend route metadata; resolve legacy SALES references before relying on old scripts.
    links:
      - rel: caveat
        ref: facts.structural_quirks.quirk_role_name_drift
  - id: avoid_generated_noise
    text: Do not edit or model node_modules, dist, .venv, __pycache__, .pytest_cache, or SQLite DB files as source; treat them as generated/state artifacts unless a task explicitly targets them.
    links:
      - rel: caveat
        ref: facts.structural_quirks.quirk_generated_artifacts_committed
  - id: check_import_namespace
    text: Before running backend code outside its prepared fixture environment, verify that the example_projects.pharmax import namespace resolves.
    links:
      - rel: caveat
        ref: facts.structural_quirks.quirk_example_projects_imports
  - id: prefer_runtime_over_docs
    text: When docs and source conflict, prefer Backend/app, Frontend/src, and executable smoke tests over README/PROJECT_BRIEF claims.
    links:
      - rel: supports
        ref: facts.source_truth.source_runtime_code
