code_style:
  - id: backend_layering_style
    text: Backend changes should keep routes thin and delegate business rules to services; schemas and models remain separate from route orchestration.
  - id: frontend_api_style
    text: Frontend API calls should use Frontend/src/services/api.js or service modules rather than ad hoc fetch calls so auth, timeout, and loading behavior stay consistent.
  - id: route_metadata_style
    text: Frontend route role metadata should stay aligned with backend role dependencies for the same feature surface.
git_workflow:
  - id: no_fixture_generated_commits
    text: Avoid committing regenerated node_modules, dist, .venv, __pycache__, .pytest_cache, or local DB state when making source changes.
negative_instructions:
  - id: do_not_model_acts_as_baseline
    text: Do not place stable repo structure or baseline project representation in acts.yaml; acts records checked activity and handoff state only.
  - id: do_not_duplicate_verify_commands
    text: Do not repeat full command strings in expect.verify; use command_ref to point at this command inventory.
  - id: do_not_trust_old_sales_role
    text: Do not assume SALES is a valid current role without confirming current UserRole and route dependencies.
stop_and_ask:
  - id: ask_before_deployment
    trigger: Task would deploy to Render or alter production-like env/secrets.
    question: Confirm deployment target and secrets handling before changing or deploying production configuration.
  - id: ask_before_db_state_edit
    trigger: Task would directly mutate Backend/app/_db/pharmax.db or product master data files.
    question: Confirm whether fixture DB/data state should be changed or only source/scripts should be updated.
