structural_quirks:
  - id: quirk_fixture_import_prefix
    summary: Runtime modules and tests import through example_projects.autopahe rather than plain local package imports.
    hazard: A future edit may incorrectly strip or mix import conventions and break fixture tests/imports.
    kind: fixture_adaptation
    evidence:
      - source: Frame lab/fixtures/autopahe/project/cli.py:17-18,34; Frame lab/fixtures/autopahe/project/auto_pahe.py:63-90; Frame lab/fixtures/autopahe/project/tests/test_cli.py:1
        why: Prefix is repeated across entrypoint and tests.
        confidence: high
  - id: quirk_checked_in_noise
    summary: Fixture includes checked-in dist artifacts, __pycache__, data backups/state JSON, json_data, and feature execution JSON despite ignore rules.
    hazard: Tools may overfit generated/state files as current source or spend context on stale build outputs.
    kind: generated_or_cached_noise
    evidence:
      - source: Frame lab/fixtures/autopahe/project/dist/; Frame lab/fixtures/autopahe/project/ap_core/__pycache__/; Frame lab/fixtures/autopahe/project/data/; Frame lab/fixtures/autopahe/project/features/json_data/execution_data.json
        why: File inspection found these generated/state paths in the fixture.
        confidence: high
      - source: Frame lab/fixtures/autopahe/project/.gitignore:1-23
        why: Ignore rules treat many of these as non-source outputs.
        confidence: high
  - id: quirk_requirements_pin_drift
    summary: pyproject.toml allows playwright>=1.45.0 while requirements.txt pins playwright==1.56.0 and Docker base image uses Playwright Python v1.56.0.
    hazard: Setup behavior may differ depending on uv/package metadata versus requirements/Docker install path.
    kind: doc_code_drift
    evidence:
      - source: Frame lab/fixtures/autopahe/project/pyproject.toml:24-33; Frame lab/fixtures/autopahe/project/requirements.txt:1-8; Frame lab/fixtures/autopahe/project/Dockerfile:1-10
        why: Dependency versions differ across install surfaces.
        confidence: high
  - id: quirk_browser_handoff
    summary: Browser downloads are explicit user handoff flows with local file verification; they are not fully silent browser automation.
    hazard: A tool may design tests or code changes that assume direct automated downloads without user/local-file confirmation.
    kind: operational_caveat
    evidence:
      - source: Frame lab/fixtures/autopahe/project/README.md:111-132; Frame lab/fixtures/autopahe/project/auto_pahe.py:163-217
        why: Docs and code both describe browser link handoff and local file checks.
        confidence: high
  - id: quirk_config_import_side_effect
    summary: Root config.py creates data directories and may migrate legacy data at import time.
    hazard: Importing config.py in tests/tools can mutate filesystem state unless env/path behavior is controlled.
    kind: operational_caveat
    evidence:
      - source: Frame lab/fixtures/autopahe/project/config.py:123-130
        why: ensure_data_directories and migration flag logic run on import.
        confidence: high

ambiguities:
  - id: amb_docker_download_path
    question: Dockerfile sets AUTOPAHE_DOWNLOAD_DIR=/app/data/downloads while docker-compose also mounts ~/Downloads/autopahe at /app/downloads; which location is the intended container download target?
    status: open
    evidence:
      - source: Frame lab/fixtures/autopahe/project/Dockerfile:21-28; Frame lab/fixtures/autopahe/project/docker-compose.yml:14-25
        why: Container support files expose two plausible download paths.
        confidence: medium

