frame:
  file: facts
  schema_version: "0.1.0"
  role: current_project_truth
  status: draft
  last_reviewed: "2026-06-01"
  updated_by: Hermes Agent
  update_reason: Refit autopahe fixture to adjusted FRAME five-part v0.1.0 schema.

project_profile:
  summary: Python CLI package for AnimePahe search, browser download handoff, streaming, record/collection management, sorting, and update/setup support.
  family: cli-tool
  system_role: End-user desktop/terminal assistant that coordinates AnimePahe lookup, Kwik/browser handoff, local state, and file organization.
  complexity: medium
  scale_guidance: Model the repo through its CLI/package boundary, Playwright/browser setup, platform path/state helpers, tests, Docker support, and checked-in generated/state noise rather than every utility function.
  evidence:
    - source: Frame lab/fixtures/autopahe/project/pyproject.toml:1-60
      why: Defines package identity, Python version, dependencies, and console script.
      confidence: high
    - source: Frame lab/fixtures/autopahe/project/README.md:8-13,81-178
      why: Describes the CLI product surface and example command families.
      confidence: high

identity:
  fixture_id: autopahe
  repo_root: Frame lab/fixtures/autopahe/project
  package_name: autopahe
  version: "3.6.1"
  console_script: autopahe = auto_pahe:main
  python_requirement: ">=3.10"

classification:
  primary_stack:
    - Python
    - Typer
    - Click
    - Playwright
    - requests
    - BeautifulSoup
    - Rich
    - pytest
  package_shape: setuptools package with root py-modules plus ap_core, features, and collection packages.
  operating_shape: Stateful CLI with browser-mediated download/streaming flows, cross-platform config/data/cache locations, and Docker support.

technology:
  packaging:
    build_backend: setuptools.build_meta
    console_script: autopahe = auto_pahe:main
    modules:
      - auto_pahe
      - kwikdown
      - config
      - state
      - cli
    packages:
      - ap_core
      - features
      - collection
  runtime_dependencies:
    - requests>=2.31.0
    - playwright>=1.45.0 in pyproject.toml; playwright==1.56.0 in requirements.txt
    - tqdm>=4.66.0
    - colorama>=0.4.6
    - rich>=13.0.0
    - beautifulsoup4>=4.12.0
    - typer>=0.12.5
    - click>=8.0.0
  test_dependencies:
    - pytest>=7.0 optional extra

architecture:
  entrypoints:
    - path: auto_pahe.py
      role: Main command implementation and command flow, exposed by the package console script.
    - path: cli.py
      role: Typer callback wrapper, legacy flag normalization, config subcommand handling, and delegation into auto_pahe.py.
  core_support:
    - path: ap_core/browser.py
      role: Shared requests session, Playwright installation, persistent browser context, verification sessions, and browser fetch helpers.
    - path: ap_core/config.py
      role: User-facing config file defaults, validation, sample config, and config search order.
    - path: ap_core/platform_paths.py
      role: OS-aware config/cache/data/log/download directories and legacy config locations.
    - path: config.py
      role: Central data directory constants, legacy data migration, and import-time data directory initialization.
    - path: state.py
      role: Small dataclass runtime state container for a single CLI invocation.
  feature_support:
    - path: kwikdown.py
      role: Kwik link/download/streaming helpers and filename/security challenge helpers.
    - path: features/
      role: Records, execution tracking, and sort/organize features.
    - path: collection/
      role: Collection model, manager, commands, and stats.

persistence:
  config:
    primary_locations: Platform config dir config.ini via ap_core/platform_paths.py; explicit --config can override for reads.
    defaults: browser=chromium, resolution=720, workers=1, optional download_dir/sort settings.
  data:
    standard: Platform data dir via get_data_dir().
    development: AUTO_PAHE_DEV switches DATA_DIR to a local data path derived from config.py.
    portable: AUTO_PAHE_PORTABLE switches data under ~/autopahe_data.
    managed_files:
      - records/animerecord.json
      - collection/collection.json
      - logs/autopahe.log
      - backups/animerecord_backup.json
      - .migrated
  browser_profile: Playwright persistent context stores user data under platform cache dir / playwright / browser choice.

