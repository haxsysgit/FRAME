classifications:
  package_metadata:
    summary: Python package and build metadata.
    boundary_type: package_metadata
    interface_role: Source of installable package identity and console script.
    paths:
      - pyproject.toml
      - requirements.txt
      - uv.lock
      - .python-version
  public_cli_boundary:
    summary: User-facing CLI entry and command option surface.
    boundary_type: entrypoint
    interface_role: Public command-line interface and compatibility layer.
    paths:
      - auto_pahe.py
      - cli.py
  core_support_source:
    summary: Shared implementation support for browser, cache, config, paths, updater, parser, notifications, resume, and fuzzy search.
    boundary_type: source
    interface_role: Internal implementation surface that many commands depend on.
    paths:
      - ap_core/
  feature_source:
    summary: Domain features for Kwik downloads/streaming, records, sorting, execution data, and collection handling.
    boundary_type: source
    interface_role: Internal feature modules behind CLI commands.
    paths:
      - kwikdown.py
      - features/
      - collection/
  config_and_state:
    summary: Runtime state/config helpers and local data path definitions.
    boundary_type: config
    interface_role: Persistence and runtime-state boundary; changes here can affect user files.
    paths:
      - config.py
      - state.py
      - ap_core/config.py
      - ap_core/platform_paths.py
  tests:
    summary: Small pytest regression suite.
    boundary_type: test
    interface_role: Automated verification surface for existing behavior.
    paths:
      - tests/
  docs:
    summary: README, advanced docs, maintenance/publish/project docs, release notes, and Docker guides.
    boundary_type: docs
    interface_role: Supporting user/developer instructions; lower authority than runtime code for exact behavior.
    paths:
      - README.md
      - ADVANCED.md
      - Docs/
      - release-notes/
      - docker/*.md
  infra:
    summary: Docker build/run support and compose configuration.
    boundary_type: infra
    interface_role: Containerized operation and test support.
    paths:
      - Dockerfile
      - docker-compose.yml
      - .dockerignore
      - docker/
  generated_state_noise:
    summary: Build outputs, pyc caches, local data/backups, runtime JSON, .env, and generated package artifacts that should not dominate source understanding.
    boundary_type: generated
    interface_role: Noise/hazard or state examples unless specifically targeted.
    paths:
      - dist/
      - __pycache__/
      - ap_core/__pycache__/
      - collection/__pycache__/
      - features/__pycache__/
      - data/
      - json_data/
      - features/json_data/
      - .env

