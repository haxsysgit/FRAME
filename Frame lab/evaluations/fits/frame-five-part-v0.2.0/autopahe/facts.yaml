  file: facts
  schema_version: "0.2.0"
  role: current_project_truth
  scope: baseline_project
  status: draft
  last_reviewed: "2026-06-02"
  updated_by: Hermes Agent
  update_reason: Fit autopahe fixture to frame-five-part-v0.2.0 using simplified names and link-first ownership.

profile:
  summary: Python CLI package for AnimePahe search, browser download handoff, streaming, sorting, records, collection tracking, and setup/update workflows.
  family: cli-tool
  system_role: End-user terminal assistant that coordinates AnimePahe lookup, browser-assisted Kwik flows, and local media state.
  complexity: medium
  scale_guidance: Model the repo through its package and CLI boundaries, browser/setup helpers, persistence paths, tests, Docker support, and fixture noise hazards instead of every helper function.
  links:
    - rel: points_to
      ref: map.entrypoints.console_script
    - rel: points_to
      ref: map.groups.public_cli
    - rel: points_to
      ref: map.groups.persistence
  evidence:
    - source: Frame lab/fixtures/autopahe/project/pyproject.toml:1-60
      why: Declares package identity, version, dependencies, Python floor, and console script.
      confidence: high
    - source: Frame lab/fixtures/autopahe/project/README.md:8-13,81-191
      why: Describes the user-facing CLI purpose and command families.
      confidence: high

identity:
  fixture_id: autopahe
  repo_root: Frame lab/fixtures/autopahe/project
  package_name: autopahe
  version: "3.6.1"
  console_script: autopahe = auto_pahe:main
  python_requirement: ">=3.10"

classification:
  primary_stack:
    - Python
    - Typer
    - Click
    - Playwright
    - requests
    - BeautifulSoup
    - Rich
    - pytest
  package_shape: setuptools package with top-level modules plus ap_core, features, and collection packages.
  operating_shape: Stateful cross-platform CLI with browser-mediated download/streaming flows, local config/data/cache state, and container support.

technology:
  packaging:
    build_backend: setuptools.build_meta
    console_script: autopahe = auto_pahe:main
    modules:
      - auto_pahe
      - kwikdown
      - config
      - state
      - cli
    packages:
      - ap_core
      - features
      - collection
  runtime_dependencies:
    - requests>=2.31.0
    - playwright>=1.45.0 in pyproject.toml
    - playwright==1.56.0 in requirements.txt
    - tqdm>=4.66.0
    - colorama>=0.4.6
    - rich>=13.0.0
    - beautifulsoup4>=4.12.0
    - typer>=0.12.5
    - click>=8.0.0
  test_dependencies:
    - pytest>=7.0 optional extra

architecture:
  runtime_entry:
    path: auto_pahe.py
    role: Main command implementation, setup/update flows, browser handoff logic, and feature orchestration.
  cli_wrapper:
    path: cli.py
    role: Typer callback wrapper, legacy flag normalization, config subcommand handling, and delegation into auto_pahe.py.
  core_support:
    - path: ap_core/browser.py
      role: Browser install helpers, persistent Playwright context, verification sessions, HTTP helpers, and fallback guidance.
    - path: ap_core/config.py
      role: Config defaults, validation, search order, and sample config writing.
    - path: ap_core/platform_paths.py
      role: Cross-platform config/cache/data/log/download helpers and legacy config discovery.
    - path: config.py
      role: Data directory constants, managed file paths, and import-time migration/setup.
    - path: state.py
      role: Small dataclass runtime state for a single CLI invocation.
  feature_support:
    - path: kwikdown.py
      role: Kwik download and streaming helpers.
    - path: features/
      role: Records, sorting, updater support, and execution-related helpers.
    - path: collection/
      role: Collection model, manager, commands, and statistics.

environments:
  local_source_checkout:
    install_flow: uv sync plus Playwright browser install, then uv run autopahe commands.
  installed_tool:
    install_flow: uv tool install autopahe followed by autopahe --setup.
  docker:
    install_flow: Build from Playwright Python image, install requirements and editable package, then run CLI in container.

persistence:
  config:
    primary_locations: Platform config dir config.ini via ap_core/platform_paths.py; --config can override reads.
    defaults: browser=chromium, resolution=720, workers=1, optional download_dir and sort settings.
  data:
    standard: Platform data dir via get_data_dir().
    development: AUTO_PAHE_DEV switches DATA_DIR to a local data path under the repo.
    portable: AUTO_PAHE_PORTABLE switches state under ~/autopahe_data.
    managed_files:
      - records/animerecord.json
      - collection/collection.json
      - logs/autopahe.log
      - backups/animerecord_backup.json
      - .migrated
  browser_profile: Persistent Playwright user data is stored under the platform cache dir / playwright / browser choice.

