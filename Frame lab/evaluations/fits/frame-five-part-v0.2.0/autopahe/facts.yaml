quirks:
  - id: fixture_import_prefix
    summary: Runtime modules and tests import through example_projects.autopahe even though the fixture root itself does not contain an example_projects package directory.
    hazard: Import or packaging cleanup can easily break the fixture unless every runtime and test import path is normalized together.
    kind: fixture_adaptation
    links:
      - rel: points_to
        ref: map.paths.cli_py
      - rel: points_to
        ref: map.paths.auto_pahe_py
      - rel: points_to
        ref: map.paths.tests
    evidence:
      - source: Frame lab/fixtures/autopahe/project/cli.py:17-18,34
        why: CLI wrapper imports example_projects.autopahe modules.
        confidence: high
      - source: Frame lab/fixtures/autopahe/project/auto_pahe.py:63-90
        why: Main runtime module uses the same import prefix broadly.
        confidence: high
      - source: Frame lab/fixtures/autopahe/project/tests/test_cli.py:1
        why: Tests also import via example_projects.autopahe.
        confidence: high
  - id: generated_state_noise
    summary: The fixture includes checked-in user data, backups, json state, and other non-source artifacts alongside source code.
    hazard: Agents can waste context on stale runtime artifacts or treat them as canonical source.
    kind: generated_or_cached_noise
    links:
      - rel: points_to
        ref: map.groups.generated_state
      - rel: follows
        ref: rules.rules.ignore_generated_state
    evidence:
      - source: Frame lab/fixtures/autopahe/project/.gitignore:18-23
        why: The repo intends to exclude most data paths except a placeholder.
        confidence: high
      - source: Frame lab/fixtures/autopahe/project/data/records/animerecord.json.backup.1768572461; Frame lab/fixtures/autopahe/project/json_data/animerecord.json; Frame lab/fixtures/autopahe/project/features/json_data/execution_data.json
        why: State and backup files are present in the fixture.
        confidence: high
  - id: playwright_version_drift
    summary: Playwright is loose in pyproject.toml but pinned in requirements.txt and matched by the Docker base image version.
    hazard: Setup behavior can differ across uv/package installs, requirements installs, and Docker builds.
    kind: doc_code_drift
    links:
      - rel: points_to
        ref: map.paths.pyproject
      - rel: points_to
        ref: map.paths.requirements
      - rel: points_to
        ref: map.paths.docker_assets
    evidence:
      - source: Frame lab/fixtures/autopahe/project/pyproject.toml:24-33
        why: Declares playwright>=1.45.0.
        confidence: high
      - source: Frame lab/fixtures/autopahe/project/requirements.txt:1-8
        why: Pins playwright==1.56.0.
        confidence: high
      - source: Frame lab/fixtures/autopahe/project/Dockerfile:1-10
        why: Uses Playwright Python v1.56.0 image and installs Chromium.
        confidence: high
  - id: browser_handoff_flow
    summary: Download flows are browser handoff workflows with local file verification, not silent end-to-end downloader automation.
    hazard: Test or feature changes can falsely assume the CLI owns the full file transfer path.
    kind: operational_caveat
    links:
      - rel: points_to
        ref: map.paths.auto_pahe_py
      - rel: checks
        ref: expect.must_hold.browser_handoff_contract
    evidence:
      - source: Frame lab/fixtures/autopahe/project/README.md:111-132
        why: README explains browser link handoff and manual verification session.
        confidence: high
      - source: Frame lab/fixtures/autopahe/project/auto_pahe.py:163-217
        why: Runtime code prompts for browser download confirmation and local file selection.
        confidence: high
  - id: config_import_side_effects
    summary: Root config.py creates directories and may migrate legacy data at import time.
    hazard: Importing config.py in tools or tests can mutate filesystem state unexpectedly.
    kind: operational_caveat
    links:
      - rel: points_to
        ref: map.paths.root_config
      - rel: follows
        ref: rules.rules.isolate_stateful_imports
    evidence:
      - source: Frame lab/fixtures/autopahe/project/config.py:123-130
        why: ensure_data_directories, migrate_legacy_data, and migration-flag touch run on import.
        confidence: high

