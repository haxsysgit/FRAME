frame:
  file: map
  schema_version: "0.2.0"
  role: repo_context_map
  scope: baseline_project
  status: draft
  last_reviewed: "2026-06-02"
  updated_by: Hermes Agent
  update_reason: Fit autopahe repo structure to the simplified FRAME v0.2.0 Map shape.

roots:
